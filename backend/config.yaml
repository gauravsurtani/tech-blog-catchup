podcast:
  tts_model: "openai"
  conversation_style:
    - "engaging"
    - "educational"
    - "technical but accessible"
  roles_person1: "Main host - explains concepts clearly"
  roles_person2: "Co-host - asks insightful questions, adds context"
  dialogue_structure:
    - "Introduction"
    - "Main Discussion"
    - "Key Takeaways"
    - "Wrap-up"
  output_language: "English"
  engagement_techniques:
    - "analogies"
    - "real-world examples"
    - "humor where appropriate"

llm:
  # Model config per task — swap models without touching code
  content_generation:
    model: "gpt-5.2"     # Summary + podcast script in one call
  content_scanner:
    model: "gpt-5.2"     # Article vs junk classification

crawl:
  delay_between_requests: 1.5
  max_concurrent_crawls: 3
  request_timeout: 30
  max_retries: 3
  respect_robots_txt: true

scheduler:
  crawl_cron: "0 2 * * *"       # daily at 2 AM UTC
  generate_cron: "0 4 * * *"    # daily at 4 AM UTC
  crawl_max_posts: 5             # max new posts per source per run
  generate_batch_size: 50        # max posts to generate per run
  generate_since_days: 2         # only generate for posts crawled within N days

app:
  db_path: "data/techblog.db"
  audio_dir: "audio"
  fastapi_port: 8000
