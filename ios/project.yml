name: TechBlogCatchup
options:
  bundleIdPrefix: com.techblog
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  TechBlogCatchup:
    type: application
    platform: iOS
    sources:
      - TechBlogCatchup
    settings:
      base:
        INFOPLIST_FILE: TechBlogCatchup/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.techblog.catchup
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: TechBlogCatchup/TechBlogCatchup.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.techblog.catchup
    dependencies:
      - package: MarkdownUI
      - target: ShareExtension

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
    settings:
      base:
        INFOPLIST_FILE: ShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.techblog.catchup.share
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.techblog.catchup

  TechBlogCatchupTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TechBlogCatchupTests
    dependencies:
      - target: TechBlogCatchup
    settings:
      base:
        SWIFT_VERSION: "5.9"
